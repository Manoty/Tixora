services:

  - type: web
    name: tixora-backend
    runtime: python
    rootDir: tixora_backend
    buildCommand: chmod +x ../build.sh && ../build.sh
    startCommand: gunicorn tixora_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 60
    healthCheckPath: /api/v1/events/

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: tixora_backend.settings_prod
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: tixora-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://tixora-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: tixora-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        value: https://tixora-backend.onrender.com/api/v1/payments/mpesa/callback/
      - key: MPESA_ENVIRONMENT
        value: sandbox

  - type: web
    name: tixora-frontend
    runtime: static
    rootDir: tixora-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_BASE_URL
        value: https://tixora-backend.onrender.com/api/v1

databases:
  - name: tixora-db
    databaseName: tixora_db
    user: tixora_user
    plan: free